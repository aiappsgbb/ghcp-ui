# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

name: ghcp-ui
metadata:
  template: ghcp-ui@0.1.0

infra:
  provider: bicep
  path: infra
  module: main

services:
  web:
    project: .
    language: ts
    host: containerapp
    docker:
      path: Dockerfile
      context: .
      remoteBuild: true
